# Temporary config used only for initial certificate generation.
# Serves ACME challenge on port 80, everything else redirects after certs exist.
server {
    listen 80;
    server_name elektro-luka.com www.elektro-luka.com;

    # Let's Encrypt ACME challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        root /usr/share/nginx/html;
        try_files $uri $uri/ /404.html;
    }
}
