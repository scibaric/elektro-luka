server {
    listen 80;
    server_name elektro-luka.com www.elektro-luka.com;
    root /usr/share/nginx/html;
    index index.html;

    # SPA-style fallback to 404 page
    location / {
        try_files $uri $uri/ /404.html;
    }

    # Cache static assets for 30 days
    location ~* \.(css|js|jpg|jpeg|png|gif|ico|svg|mp4|webmanifest)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Gzip compression
    gzip on;
    gzip_types text/html text/css application/javascript image/svg+xml application/json;
}
