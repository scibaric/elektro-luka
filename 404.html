<!doctype html>
<html lang="hr">

<head>
  <meta charset="utf-8">
  <title>Stranica nije pronađena — Luka Elektro</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    * {
      line-height: 1.2;
      margin: 0;
    }

    html {
      color: #888;
      display: table;
      font-family: 'Segoe UI', Arial, sans-serif;
      height: 100%;
      text-align: center;
      width: 100%;
    }

    body {
      display: table-cell;
      vertical-align: middle;
      margin: 2em auto;
    }

    h1 {
      color: #555;
      font-size: 2em;
      font-weight: 400;
    }

    p {
      margin: 0.8em auto 0;
      width: 320px;
      font-size: 1.1em;
    }

    a {
      color: #00bcd4;
      text-decoration: none;
      font-weight: 600;
    }

    a:hover {
      text-decoration: underline;
    }

    @media only screen and (max-width: 280px) {
      body, p {
        width: 95%;
      }

      h1 {
        font-size: 1.5em;
        margin: 0 0 0.3em;
      }
    }
  </style>
</head>

<body>
  <h1>Stranica nije pronađena</h1>
  <p>Stranica koju tražite ne postoji.</p>
  <p><a href="/">← Natrag na početnu</a></p>
</body>

</html>
